<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ana Pet - Live2D 桌面宠物</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      overflow: hidden;
      height: 100vh;
    }
    #app { width: 100%; height: 100%; position: relative; }
    #live2d-container {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 500px;
    }
    canvas { width: 100%; height: 100%; }
    #chat-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 300px;
      max-height: 400px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #chat-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px 16px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      min-height: 200px;
      max-height: 300px;
    }
    .message {
      margin-bottom: 10px;
      padding: 8px 12px;
      border-radius: 12px;
      max-width: 85%;
      word-wrap: break-word;
    }
    .message.user {
      background: #667eea;
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .message.assistant {
      background: #f0f0f0;
      color: #333;
      margin-right: auto;
      border-bottom-left-radius: 4px;
    }
    #chat-input-container {
      padding: 12px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
    }
    #chat-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 20px;
      outline: none;
      font-size: 14px;
    }
    #chat-input:focus { border-color: #667eea; }
    #send-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    #send-btn:hover { background: #5568d3; }
    #status {
      position: fixed;
      top: 10px;
      left: 10px;
      padding: 6px 12px;
      background: rgba(0,0,0,0.7);
      color: white;
      border-radius: 6px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="live2d-container">
      <canvas id="live2d-canvas"></canvas>
    </div>
    
    <div id="chat-container">
      <div id="chat-header">
        <span>💬 Ana</span>
        <span id="status">状态: <span id="status-text">初始化中...</span></span>
      </div>
      <div id="chat-messages">
        <div class="message assistant">你好！我是 Ana，有什么可以帮你的吗？</div>
      </div>
      <div id="chat-input-container">
        <input type="text" id="chat-input" placeholder="发送消息..." />
        <button id="send-btn">发送</button>
      </div>
    </div>
  </div>

  <!-- 简化版：先只加载 Chat 功能 -->
  <script>
    const statusText = document.getElementById('status-text');
    const chatMessages = document.getElementById('chat-messages');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');

    function setStatus(text) {
      statusText.textContent = text;
      console.log('Status:', text);
    }

    // Chat 功能
    async function sendMessage() {
      const message = chatInput.value.trim();
      if (!message) return;

      addMessage(message, 'user');
      chatInput.value = '';
      setStatus('思考中...');

      try {
        const response = await fetch('http://localhost:1234/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [
              { role: 'system', content: '你是一个可爱的桌面宠物助手，名叫 Ana。请用简短友好的语气回复。' },
              { role: 'user', content: message }
            ],
            model: 'ana',
            stream: false
          })
        });

        const data = await response.json();
        const reply = data.choices?.[0]?.message?.content || '抱歉，我没听清楚...';
        
        addMessage(reply, 'assistant');
        setStatus('在线');
      } catch (error) {
        console.error('Chat error:', error);
        addMessage('连接失败，请确保桥接服务已启动', 'assistant');
        setStatus('连接失败');
      }
    }

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = text;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // 暂时跳过 Live2D
    setStatus('在线 (聊天模式)');
  </script>
</body>
</html>
