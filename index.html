<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inni Pet - Live2D 桌面宠物</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      overflow: hidden;
      height: 100vh;
      -webkit-app-region: no-drag;
    }
    #app { width: 100%; height: 100%; position: relative; }
    /* Live2D 画布区域 */
    #live2d-container {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 600px;
      -webkit-app-region: no-drag;
      background: transparent;
    }
    canvas {
      width: 100%;
      height: 100%;
      background: transparent !important;
    }

    /* 对话字幕 */
    #subtitle {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 0;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      color: rgba(255,255,255,0.95);
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.55;
      width: 100%;
      max-height: 120px;
      overflow-y: auto;
      text-align: left;
      word-wrap: break-word;
      display: none;
      pointer-events: auto;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 8px 28px rgba(0,0,0,0.32);
      white-space: pre-wrap;
      z-index: 999;
    }
    #subtitle.visible { display: block; }

    /* 实时识别字幕 */
    #live-subtitle {
      position: absolute;
      bottom: 200px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.85);
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      max-width: 80%;
      text-align: center;
      word-wrap: break-word;
      opacity: 0;
      pointer-events: none;
      border: 1px solid rgba(255,77,141,0.25);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      z-index: 19;
      transition: opacity 0.3s;
      white-space: pre-wrap;
    }
    #live-subtitle.visible { opacity: 1; }
    #live-subtitle .interim {
      color: rgba(255,255,255,0.5);
      font-style: italic;
    }
    #live-subtitle .final {
      color: rgba(255,255,255,0.95);
    }

    /* 输入框面板 */
    #chat-container {
      position: fixed;
      bottom: 8px;
      left: 50%;
      right: auto;
      transform: translateX(-50%);
      width: 320px;
      background: rgba(20, 20, 35, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 20px;
      box-shadow:
        0 8px 32px rgba(255,77,141,0.25),
        0 0 0 1px rgba(255,255,255,0.1) inset;
      padding: 14px;
      z-index: 998;
      -webkit-app-region: no-drag;
    }
    #input-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      cursor: move;
      user-select: none;
    }
    #input-panel-header.dragging {
      cursor: grabbing;
    }
    #tab-bar {
      display: flex;
      gap: 4px;
    }
    .tab-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.45);
      padding: 5px 14px;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-app-region: no-drag;
    }
    .tab-btn.active {
      background: rgba(255,77,141,0.25);
      border-color: rgba(255,77,141,0.4);
      color: rgba(255,255,255,0.9);
    }
    .tab-btn:hover:not(.active) {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7);
    }
    #input-panel-close {
      background: rgba(255,255,255,0.12);
      border: none;
      color: rgba(255,255,255,0.6);
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #input-panel-close:hover { background: rgba(255,255,255,0.25); }

    /* Tab 内容区 */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* 设置面板 */
    #settings-panel { padding: 4px 0; }
    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 4px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .setting-item:last-child { border-bottom: none; }
    .setting-label {
      color: rgba(255,255,255,0.75);
      font-size: 13px;
    }
    .setting-hint {
      display: block;
      color: rgba(255,255,255,0.35);
      font-size: 10.5px;
      margin-top: 2px;
    }
    .setting-item.column {
      display: block;
    }
    .gateway-select {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 10px;
    }
    .gateway-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.58);
      height: 30px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      -webkit-app-region: no-drag;
    }
    .gateway-btn.active {
      background: rgba(255,77,141,0.25);
      border-color: rgba(255,77,141,0.48);
      color: rgba(255,255,255,0.92);
    }
    .gateway-btn:hover:not(.active) {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.78);
    }
    /* Toggle 开关 */
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 26px;
      flex-shrink: 0;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.15);
      border-radius: 26px;
      transition: 0.25s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.25s;
    }
    .toggle-switch input:checked + .toggle-slider {
      background: linear-gradient(135deg, #ff4d8d, #e040fb);
    }
    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(18px);
    }

    /* 调试面板 - 滑块 */
    .slider-item {
      padding: 8px 4px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .slider-item:last-child { border-bottom: none; }
    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .slider-label {
      color: rgba(255,255,255,0.75);
      font-size: 12.5px;
    }
    .slider-value {
      color: rgba(255,105,180,0.9);
      font-size: 12px;
      font-weight: 600;
      min-width: 30px;
      text-align: right;
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    input[type="range"] {
      -webkit-appearance: none;
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff4d8d, #e040fb);
      cursor: pointer;
      border: none;
    }
    .btn-reset {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.6);
      padding: 6px 14px;
      border-radius: 14px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-reset:hover {
      background: rgba(255,77,141,0.2);
      color: rgba(255,255,255,0.9);
    }

    /* 调试切换按钮 */
    #debug-toggle-btn {
      position: fixed;
      left: 10px;
      bottom: 10px;
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 997;
      -webkit-app-region: no-drag;
      transition: background 0.2s;
    }
    #debug-toggle-btn:hover { background: rgba(255,77,141,0.3); }

    /* 对话面板重新打开按钮 */
    #chat-reopen-btn {
      position: fixed;
      right: 10px;
      bottom: 10px;
      width: 34px;
      height: 34px;
      background: rgba(255,77,141,0.3);
      border: 1px solid rgba(255,77,141,0.4);
      border-radius: 50%;
      cursor: pointer;
      font-size: 15px;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 997;
      -webkit-app-region: no-drag;
      transition: background 0.2s, transform 0.15s;
      color: rgba(255,255,255,0.85);
    }
    #chat-reopen-btn.visible { display: flex; }
    #chat-reopen-btn:hover { background: rgba(255,77,141,0.5); transform: scale(1.1); }

    /* 独立调试窗口 */
    #debug-window {
      position: fixed;
      left: 10px;
      bottom: 50px;
      width: 240px;
      background: rgba(20, 20, 35, 0.9);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(255,77,141,0.25), 0 0 0 1px rgba(255,255,255,0.1) inset;
      padding: 12px;
      z-index: 996;
      -webkit-app-region: no-drag;
      display: none;
    }
    #debug-window.visible { display: block; }
    .dw-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      color: rgba(255,255,255,0.65);
      font-size: 12px;
      font-weight: 600;
    }
    .dw-close {
      background: rgba(255,255,255,0.1);
      border: none;
      color: rgba(255,255,255,0.5);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
    }
    .dw-close:hover { background: rgba(255,255,255,0.2); }

    #input-panel-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #chat-input {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 10px 16px;
      outline: none;
      font-size: 13.5px;
      color: rgba(255,255,255,0.9);
      transition: border-color 0.2s, background 0.2s;
    }
    #chat-input::placeholder { color: rgba(255,255,255,0.35); }
    #chat-input:focus {
      border-color: rgba(255,77,141,0.5);
      background: rgba(255,255,255,0.14);
    }
    #send-btn, #mic-btn {
      background: linear-gradient(135deg, #ff4d8d 0%, #e040fb 100%);
      color: white;
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.15s;
    }
    #send-btn:hover { opacity: 0.88; transform: scale(1.08); }
    #send-btn:active { transform: scale(0.95); }
    #mic-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 17px;
    }
    #mic-btn:hover { background: rgba(255,77,141,0.3); transform: scale(1.08); }
    #mic-btn:active, #mic-btn.listening {
      background: rgba(255,77,141,0.6);
      transform: scale(1.05);
      animation: micPulse 1s ease-in-out infinite;
    }
    @keyframes micPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,77,141,0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(255,77,141,0); }
    }

    button, input, canvas { -webkit-app-region: no-drag; }
  </style>
</head>
  <body>
    <div id="app">
    <div id="live2d-container">
      <canvas id="live2d-canvas"></canvas>
      <div id="live-subtitle"><span class="final"></span><span class="interim"></span></div>
    </div>

    <!-- 输入框面板 -->
    <div id="chat-container">
      <div id="input-panel-header">
        <div id="tab-bar">
          <button class="tab-btn active" data-tab="chat">对话</button>
          <button class="tab-btn" data-tab="settings">设置</button>
        </div>
        <button id="input-panel-close">✕</button>
      </div>

      <!-- 对话 Tab -->
      <div id="chat-panel" class="tab-content active">
        <div id="input-panel-row">
          <input type="text" id="chat-input" placeholder="输入消息，按回车发送..." />
          <button id="mic-btn" title="语音输入">🎤</button>
          <button id="send-btn">➤</button>
        </div>
        <div id="subtitle"></div>
      </div>

      <!-- 设置 Tab -->
      <div id="settings-panel" class="tab-content">
        <div class="setting-item">
          <div>
            <span class="setting-label">语音输出</span>
            <span class="setting-hint">关闭后 Inni 不再朗读回复，节省 API 用量</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="tts-toggle" checked />
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="setting-item column">
          <div>
            <span class="setting-label">对话 Gateway</span>
            <span class="setting-hint" id="gateway-hint">选择后下一条消息立即生效</span>
          </div>
          <div class="gateway-select" id="gateway-select">
            <button class="gateway-btn" data-gateway="minimax">MiniMax</button>
            <button class="gateway-btn" data-gateway="openclaw">OpenClaw</button>
            <button class="gateway-btn" data-gateway="hermes">Hermes</button>
          </div>
        </div>
        <div class="setting-item">
          <div>
            <span class="setting-label">连续摇摆</span>
            <span class="setting-hint">开启后 Inni 一直跟随节奏摇摆，不会自动做其他动作</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="sway-toggle" />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>

    <!-- 调试切换按钮 -->
    <button id="debug-toggle-btn" title="调试面板">🔧</button>

    <!-- 对话面板重新打开按钮 -->
    <button id="chat-reopen-btn" title="打开对话面板">💬</button>

    <!-- 调试窗口（独立） -->
    <div id="debug-window">
      <div class="dw-header">
        <span>🔧 调试</span>
        <button class="dw-close" id="debug-close-btn">✕</button>
      </div>
      <div class="slider-item">
        <div class="slider-header">
          <span class="slider-label">左耳 ear_left</span>
          <span class="slider-value" id="ear-left-val">0</span>
        </div>
        <div class="slider-row">
          <span style="color:rgba(255,255,255,0.3);font-size:11px;">-60</span>
          <input type="range" id="ear-left-slider" min="-60" max="60" value="0" step="1" />
          <span style="color:rgba(255,255,255,0.3);font-size:11px;">60</span>
        </div>
      </div>
      <div class="slider-item">
        <div class="slider-header">
          <span class="slider-label">右耳 ear_right</span>
          <span class="slider-value" id="ear-right-val">0</span>
        </div>
        <div class="slider-row">
          <span style="color:rgba(255,255,255,0.3);font-size:11px;">-60</span>
          <input type="range" id="ear-right-slider" min="-60" max="60" value="0" step="1" />
          <span style="color:rgba(255,255,255,0.3);font-size:11px;">60</span>
        </div>
      </div>
      <button class="btn-reset" id="btn-reset-ears">归零</button>

      <div class="slider-item" style="margin-top:6px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.1);">
        <div class="slider-header">
          <span class="slider-label">模型 X 位置</span>
          <span class="slider-value" id="model-x-val">200</span>
        </div>
        <div class="slider-row">
          <span style="color:rgba(255,255,255,0.3);font-size:11px;">50</span>
          <input type="range" id="model-x-slider" min="50" max="350" value="200" step="1" />
          <span style="color:rgba(255,255,255,0.3);font-size:11px;">350</span>
        </div>
      </div>
      <div class="slider-item">
        <div class="slider-header">
          <span class="slider-label">模型 Y 位置</span>
          <span class="slider-value" id="model-y-val">850</span>
        </div>
        <div class="slider-row">
          <span style="color:rgba(255,255,255,0.3);font-size:11px;">500</span>
          <input type="range" id="model-y-slider" min="500" max="1100" value="850" step="1" />
          <span style="color:rgba(255,255,255,0.3);font-size:11px;">1100</span>
        </div>
      </div>
      <button class="btn-reset" id="btn-reset-pos">复位</button>
    </div>
  </div>

  <!-- Pixi.js -->
  <script src="./pixi.min.js"></script>
  <script>window.process = window.process || { env: { NODE_ENV: 'production' } };</script>
  <script src="./live2dcubismcore.min.js"></script>
  <script src="./cubism4.min.js"></script>

  <script>
    let pixiApp = null;
    let model = null;
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const gatewayButtons = document.querySelectorAll('.gateway-btn');
    const gatewayHint = document.getElementById('gateway-hint');
    const canvas = document.getElementById('live2d-canvas');
    const subtitle = document.getElementById('subtitle');
    const liveSubtitle = document.getElementById('live-subtitle');
    const liveSubtitleFinal = liveSubtitle.querySelector('.final');
    const liveSubtitleInterim = liveSubtitle.querySelector('.interim');
    let subtitleTimer = null;
    let currentAudio = null; // 当前播放的音频
    let ttsEnabled = true;   // 语音输出开关
    const savedGateway = localStorage.getItem('inni-chat-gateway');
    let currentGateway = savedGateway || 'minimax';
    let removeCursorTracker = null;
    let removePetClickListener = null;
    let removeGestureCommandListener = null;
    let currentGesture = null;
    let idleGestureTimer = null;
    let idleEnabled = true;
    let continuousSwayEnabled = false;
    let blinkState = 'open';      // 'open' | 'closing' | 'opening'
    let blinkStartTime = 0;
    let nextBlinkAt = 0;
    const BLINK_CLOSE_MS = 75;
    const BLINK_OPEN_MS = 75;
    const BLINK_INTERVAL_MIN = 2000;
    const BLINK_INTERVAL_MAX = 5000;

    function easeOutBack(t) {
      const c1 = 1.70158;
      const c3 = c1 + 1;
      return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    }

    function easeInOutSine(t) {
      return -(Math.cos(Math.PI * t) - 1) / 2;
    }

    function applyModelParam(id, value) {
      model?.internalModel?.coreModel?.setParameterValueById(id, value);
    }

    function startGesture(name, keyframes, source = 'manual') {
      const prefix = source === 'auto' ? '自动动作' : '手动触发';
      console.log(`[Inni] ${prefix}: ${name}`);
      currentGesture = {
        name,
        keyframes,
        startedAt: performance.now(),
        duration: keyframes[keyframes.length - 1].time
      };
    }

    const gesturePresets = {
      shake: (source) => startGesture('随节奏摇摆', [
        { time: 0,    values: { ParamAngleZ: 0 } },
        { time: 750,  values: { ParamAngleZ: -14 } },
        { time: 1500, values: { ParamAngleZ: 14 } },
        { time: 2250, values: { ParamAngleZ: -10 } },
        { time: 3000, values: { ParamAngleZ: 10 } },
        { time: 3750, values: { ParamAngleZ: 0 } }
      ], source),
      sleep: (source) => startGesture('闭眼休息', [
        { time: 0,    values: { ParamEyeLOpen: 1, ParamEyeROpen: 1 } },
        { time: 300,  values: { ParamEyeLOpen: 0, ParamEyeROpen: 0 } },
        { time: 2700, values: { ParamEyeLOpen: 0, ParamEyeROpen: 0 } },
        { time: 3000, values: { ParamEyeLOpen: 1, ParamEyeROpen: 1 } }
      ], source)
    };

    function playGesture(name, source = 'manual') {
      if (currentGesture) return;
      if (name === 'random') return playRandomGesture(source);

      const preset = gesturePresets[name];
      if (!preset) {
        console.log(`[Inni] 未知动作: ${name}`);
        return;
      }
      preset(source);
    }

    function playRandomGesture(source = 'manual') {
      if (currentGesture) return;
      const names = Object.keys(gesturePresets);
      playGesture(names[Math.floor(Math.random() * names.length)], source);
    }

    function updateGesture() {
      if (currentGesture) {
        const elapsed = performance.now() - currentGesture.startedAt;
        if (elapsed >= currentGesture.duration) {
          for (const [id, value] of Object.entries(currentGesture.keyframes[currentGesture.keyframes.length - 1].values)) {
            applyModelParam(id, value);
          }
          currentGesture = null;
          // 连续摇摆模式：动作结束后立即重新开始
          if (continuousSwayEnabled) {
            gesturePresets.shake('auto');
          }
        } else {
          let from = currentGesture.keyframes[0];
          let to = currentGesture.keyframes[currentGesture.keyframes.length - 1];
          for (let i = 0; i < currentGesture.keyframes.length - 1; i++) {
            if (elapsed >= currentGesture.keyframes[i].time && elapsed <= currentGesture.keyframes[i + 1].time) {
              from = currentGesture.keyframes[i];
              to = currentGesture.keyframes[i + 1];
              break;
            }
          }
          const span = Math.max(1, to.time - from.time);
          const t = easeInOutSine(Math.max(0, Math.min(1, (elapsed - from.time) / span)));
          const ids = new Set([...Object.keys(from.values), ...Object.keys(to.values)]);
          for (const id of ids) {
            const start = from.values[id] ?? 0;
            const end = to.values[id] ?? 0;
            applyModelParam(id, start + (end - start) * t);
          }
        }
      } else {
        // 无手势时：每帧强制写入调试滑块值，防止模型物理系统覆盖
        if (model) {
          applyModelParam('ear_left', parseInt(earLeftSlider?.value || 0));
          applyModelParam('ear_right', parseInt(earRightSlider?.value || 0));
          updateBlink();
        }
      }
    }

    function updateBlink() {
      const now = performance.now();
      if (nextBlinkAt === 0) {
        nextBlinkAt = now + BLINK_INTERVAL_MIN + Math.random() * (BLINK_INTERVAL_MAX - BLINK_INTERVAL_MIN);
        return;
      }

      if (blinkState === 'open') {
        applyModelParam('ParamEyeLOpen', 1);
        applyModelParam('ParamEyeROpen', 1);
        if (now >= nextBlinkAt) {
          blinkState = 'closing';
          blinkStartTime = now;
        }
      } else if (blinkState === 'closing') {
        const elapsed = now - blinkStartTime;
        if (elapsed >= BLINK_CLOSE_MS) {
          applyModelParam('ParamEyeLOpen', 0);
          applyModelParam('ParamEyeROpen', 0);
          blinkState = 'opening';
          blinkStartTime = now;
        } else {
          const t = elapsed / BLINK_CLOSE_MS;
          const v = 1 - easeOutBack(t);
          applyModelParam('ParamEyeLOpen', v);
          applyModelParam('ParamEyeROpen', v);
        }
      } else if (blinkState === 'opening') {
        const elapsed = now - blinkStartTime;
        if (elapsed >= BLINK_OPEN_MS) {
          applyModelParam('ParamEyeLOpen', 1);
          applyModelParam('ParamEyeROpen', 1);
          blinkState = 'open';
          nextBlinkAt = now + BLINK_INTERVAL_MIN + Math.random() * (BLINK_INTERVAL_MAX - BLINK_INTERVAL_MIN);
        } else {
          const t = elapsed / BLINK_OPEN_MS;
          const v = easeOutBack(t);
          applyModelParam('ParamEyeLOpen', v);
          applyModelParam('ParamEyeROpen', v);
        }
      }
    }

    // 显示字幕
    function showSubtitle(text) {
      if (subtitleTimer) clearTimeout(subtitleTimer);

      const chunks = splitReplyText(text);
      let index = 0;

      const showNext = () => {
        const chunk = chunks[index] || '';
        subtitle.textContent = chunk;
        subtitle.classList.add('visible');

        const stayMs = Math.max(2200, Math.min(9000, 1400 + chunk.length * 120));
        subtitleTimer = setTimeout(() => {
          index++;
          if (index < chunks.length) {
            showNext();
          } else {
            subtitle.classList.remove('visible');
            subtitleTimer = null;
          }
        }, stayMs);
      };

      showNext();
    }

    function splitReplyText(text) {
      const normalized = String(text || '').replace(/\s+/g, ' ').trim();
      if (!normalized) return [''];

      const maxLen = 72;
      const sentences = normalized.match(/[^。！？!?；;]+[。！？!?；;]?/g) || [normalized];
      const chunks = [];
      let current = '';

      for (const sentence of sentences) {
        const part = sentence.trim();
        if (!part) continue;
        if ((current + part).length <= maxLen) {
          current += part;
          continue;
        }
        if (current) chunks.push(current);
        if (part.length <= maxLen) {
          current = part;
        } else {
          for (let i = 0; i < part.length; i += maxLen) {
            chunks.push(part.slice(i, i + maxLen));
          }
          current = '';
        }
      }

      if (current) chunks.push(current);
      return chunks.length ? chunks : [normalized];
    }

    let isContinuousMode = false;

    // ---- Web Speech API 部分 ----
    let recognition = null;
    let finalTranscript = '';
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'zh-CN';
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        console.log('[Mic] Web Speech 识别开始');
        isListening = true;
        isUsingWhisper = false;
        micBtn.classList.add('listening');
        setStatus('正在聆听...');
        liveSubtitle.classList.add('visible');
        liveSubtitleFinal.textContent = '';
        liveSubtitleInterim.textContent = '';
        finalTranscript = '';
      };

      recognition.onresult = (event) => {
        let interimTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            finalTranscript += transcript;
            liveSubtitleFinal.textContent = finalTranscript;
            liveSubtitleInterim.textContent = '';
            console.log('[Mic] 最终识别:', finalTranscript);
          } else {
            interimTranscript += transcript;
            liveSubtitleInterim.textContent = interimTranscript;
          }
        }
      };

      recognition.onend = () => {
        console.log('[Mic] Web Speech 识别结束');
        isListening = false;

        if (finalTranscript.trim()) {
          chatInput.value = finalTranscript.trim();
          liveSubtitleFinal.textContent = finalTranscript.trim();
          liveSubtitleInterim.textContent = '';
          setTimeout(() => sendMessage(), 300);
        }

        // 持续模式下继续（如果没切换到 whisper）
        if (isContinuousMode && !isUsingWhisper) {
          setTimeout(() => {
            if (isContinuousMode && !isListening && !isUsingWhisper) {
              try { recognition.start(); } catch (e) {}
            }
          }, 500);
        }
      };

      recognition.onerror = (event) => {
        console.error('[Mic] Web Speech 错误:', event.error);
        if (event.error === 'network') {
          // 网络错误，切换到 Whisper ASR
          console.log('[Mic] 网络错误，切换到 Whisper ASR');
          setStatus('切换到本地识别...');
          switchToWhisperASR();
        } else if (event.error === 'not-allowed') {
          setStatus('麦克风权限被拒绝');
          isContinuousMode = false;
        } else if (event.error === 'no-speech') {
          // 继续监听
        } else {
          setStatus('识别出错');
        }
      };
    }

    // ---- Whisper ASR 备用方案 ----
    let mediaRecorder = null;
    let audioChunks = [];
    let micStream = null;
    let audioContext = null;
    let analyser = null;
    let silenceTimer = null;
    let lastSpeechTime = Date.now();
    const SILENCE_THRESHOLD = 0.015;
    const SILENCE_DURATION = 1500;

    function getVolume() {
      if (!analyser) return 0;
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(dataArray);
      const sum = dataArray.reduce((a, b) => a + b, 0);
      return sum / dataArray.length / 255;
    }

    function checkSilence() {
      if (!isListening || isUsingWhisper) return;
      const volume = getVolume();
      if (volume > SILENCE_THRESHOLD) {
        lastSpeechTime = Date.now();
      } else if (Date.now() - lastSpeechTime > SILENCE_DURATION) {
        console.log('[Mic] Whisper: 检测到静音，停止录音');
        if (mediaRecorder && mediaRecorder.state === 'recording') {
          mediaRecorder.stop();
        }
      }
    }

    function switchToWhisperASR() {
      if (!recognition || isUsingWhisper) return;

      // 停止 Web Speech
      try { recognition.stop(); } catch (e) {}

      isUsingWhisper = true;
      isListening = false;
      liveSubtitle.classList.remove('visible');

      startWhisperRecording();
    }

    async function startWhisperRecording() {
      if (isListening || !isContinuousMode) return;

      try {
        console.log('[Mic] Whisper: 开始录音');
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(micStream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);

        audioChunks = [];
        lastSpeechTime = Date.now();
        mediaRecorder = new MediaRecorder(micStream, { mimeType: 'audio/webm;codecs=opus' });

        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.onstart = () => {
          isListening = true;
          isUsingWhisper = true;
          micBtn.classList.add('listening');
          setStatus('正在聆听...');
          silenceTimer = setInterval(checkSilence, 100);
        };

        mediaRecorder.onstop = async () => {
          isListening = false;
          clearInterval(silenceTimer);
          silenceTimer = null;
          micBtn.classList.remove('listening');

          if (audioContext) { audioContext.close(); audioContext = null; }
          if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
          analyser = null;

          setStatus('识别中...');
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          const reader = new FileReader();
          reader.onload = async () => {
            const base64 = reader.result.split(',')[1];
            try {
              const res = await fetch('http://localhost:12434/asr', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ audio: base64 })
              });
              const data = await res.json();
              if (data.text && data.text.trim()) {
                console.log('[Mic] Whisper 识别:', data.text.trim());
                chatInput.value = data.text.trim();
                liveSubtitleFinal.textContent = data.text.trim();
                liveSubtitleInterim.textContent = '';
                liveSubtitle.classList.add('visible');
                setTimeout(() => sendMessage(), 300);
              } else {
                liveSubtitle.classList.remove('visible');
              }
            } catch (e) {
              console.error('ASR error:', e);
            }

            setStatus('在线');
            // 继续录音
            if (isContinuousMode) {
              setTimeout(() => {
                if (isContinuousMode) startWhisperRecording();
              }, 500);
            }
          };
          reader.readAsDataURL(blob);
        };

        mediaRecorder.start();
      } catch (e) {
        console.error('[Mic] Whisper 错误:', e);
        setStatus('麦克风不可用');
        isContinuousMode = false;
      }
    }

    function stopWhisperRecording() {
      isContinuousMode = false;
      isListening = false;
      isUsingWhisper = false;
      clearInterval(silenceTimer);
      silenceTimer = null;
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
      if (audioContext) { audioContext.close(); audioContext = null; }
      if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }

      micBtn.classList.remove('listening');

    async function initLive2D() {
      try {
        setStatus('初始化 PIXI...');
        pixiApp = new PIXI.Application({
          width: 400,
          height: 600,
          transparent: true,
          antialias: true,
          resolution: window.devicePixelRatio || 1,
          autoDensity: true
        });

        // 用 Pixi 创建的 canvas 替换原有的 placeholder canvas
        const pixiCanvas = pixiApp.view;
        pixiCanvas.id = 'live2d-canvas';
        canvas.replaceWith(pixiCanvas);

        const Live2DModel = PIXI.live2d.Live2DModel;
        Live2DModel.registerTicker(PIXI.Ticker);
        PIXI.settings.SCALE_MODE = PIXI.SCALE_MODES.LINEAR;

        setStatus('加载模型中...');
        model = await Live2DModel.from('./inni_model/inni_2_eye.model3.json', {
          autoFocus: false,
          autoHitTest: false
        });

        const scaleX = 400 / model.width;
        const scaleY = 600 / model.height;
        model.scale.set(Math.min(scaleX, scaleY) * 0.9);
        if (model.anchor) model.anchor.set(0.5, 1.0);
        model.position.set(200, 850);
        pixiApp.stage.addChild(model);
        model.eventMode = 'static';
        model.interactive = true;
        model.cursor = 'pointer';
        model.on('pointertap', () => playRandomGesture('manual'));
        model.internalModel.on('beforeModelUpdate', updateGesture);

        // 停掉模型自带的待机动画，防止覆盖耳朵等调试参数
        try {
          model.internalModel.motionManager?.stopAllMotions?.();
          model.internalModel.motionManager?.stopAllMotions?.();
        } catch (e) {}

        startCursorTracking();
        startPetClickListener();
        startGestureCommandListener();
        startIdleGestures();

        setStatus('在线');
        console.log('[Inni] 模型加载成功');
      } catch (error) {
        console.error('[Inni] 模型加载失败:', error);
        setStatus('模型加载失败');
      }
    }

    function setupChatPanelDrag() {
      const header = document.getElementById('input-panel-header');
      if (!header) return;

      header.addEventListener('mousedown', (event) => {
        if (event.button !== 0 || event.target.closest('button')) return;
        if (window.electronAPI?.startDrag) {
          window.electronAPI.startDrag();
          header.classList.add('dragging');
        }
        event.preventDefault();
      });

      window.addEventListener('mouseup', () => {
        if (window.electronAPI?.stopDrag) {
          window.electronAPI.stopDrag();
        }
        header.classList.remove('dragging');
      });
    }

    setupChatPanelDrag();
    window.addEventListener('load', initLive2D);
  </script>
</body>
</html>
